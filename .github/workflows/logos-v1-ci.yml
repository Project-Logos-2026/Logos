name: LOGOS V1 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance-tests:
    name: Governance & Runtime Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run governance & runtime test suite
        run: |
          python -m pytest \
            LOGOS_SYSTEM/GOVERNANCE_ENFORCEMENT \
            LOGOS_SYSTEM/RUNTIME_BRIDGE \
            LOGOS_SYSTEM/RUNTIME_CORES/RUNTIME_EXECUTION_CORE \
            LOGOS_SYSTEM/TEST_SUITE \
            -q --tb=short

  governance-print-check:
    name: No Print in Governed Modules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enforce no print() in governed startup modules
        run: bash _Governance/CI_Checks/Check_No_Print_In_Governed_Modules.sh
